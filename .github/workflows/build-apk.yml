name: Build Unlimited Data Bypass APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: |
        chmod +x gradlew || true
        chmod +x build-apk.sh || true

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --no-daemon || gradle assembleDebug --no-daemon

    - name: Build Release APK
      run: |
        ./gradlew assembleRelease --no-daemon || gradle assembleRelease --no-daemon

    - name: Sign Release APK
      run: |
        cd app/build/outputs/apk/release/
        
        # Use existing keystore or create one
        if [ -f "../../../release.keystore" ]; then
          cp ../../../release.keystore .
        else
          keytool -genkey -v -keystore release.keystore \
            -alias unlimited_bypass \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass t3rmuxk1ng \
            -keypass t3rmuxk1ng \
            -dname "CN=T3rmuxk1ng, OU=Security, O=GODTIER, L=India, ST=India, C=IN"
        fi
        
        # Zipalign
        $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/zipalign -v -p 4 \
          app-release-unsigned.apk \
          app-aligned.apk || cp app-release-unsigned.apk app-aligned.apk
        
        # Sign APK
        $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner sign \
          --ks release.keystore \
          --ks-key-alias unlimited_bypass \
          --ks-pass pass:t3rmuxk1ng \
          --key-pass pass:t3rmuxk1ng \
          --out UNLIMITED-DATA-BYPASS-v1.0-SIGNED.apk \
          app-aligned.apk || cp app-aligned.apk UNLIMITED-DATA-BYPASS-v1.0-SIGNED.apk

    - name: Rename Debug APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/UNLIMITED-DATA-BYPASS-DEBUG.apk || true

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: unlimited-data-bypass-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: unlimited-data-bypass-signed
        path: app/build/outputs/apk/release/UNLIMITED-DATA-BYPASS-v1.0-SIGNED.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Unlimited Data Bypass v1.0.${{ github.run_number }} - GOD TIER EDITION
        body: |
          ## ⚡ UNLIMITED DATA BYPASS - GOD TIER EDITION
          
          ### Features:
          - 🔥 APN Bypass Engine
          - 🌐 DNS Manipulation
          - 📝 Header Injection
          - 🔀 Proxy Bypass
          - 🚇 Tunnel Mode (SSL/SSH/WebSocket)
          - 🛡️ VPN Integration
          - 📶 5G Speed Boost
          - 🔄 Auto-Start on Boot
          
          ### Supported ISPs:
          - India: Jio, Airtel, Vi, BSNL
          - USA: T-Mobile, AT&T, Verizon
          - Africa: MTN, Airtel
          - Philippines: Globe, Smart
          - Indonesia: Telkomsel, XL
          - Brazil: Vivo, Claro
          - UK: EE, Vodafone
          - Pakistan: Jazz, Zong
          - Bangladesh: Grameenphone, Banglalink
          
          **Created by T3rmuxk1ng**
        files: |
          app/build/outputs/apk/release/UNLIMITED-DATA-BYPASS-v1.0-SIGNED.apk
          app/build/outputs/apk/debug/UNLIMITED-DATA-BYPASS-DEBUG.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
